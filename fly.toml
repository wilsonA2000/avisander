app = "distribuidoraavisander"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    VITE_PUBLIC_URL = "https://distribuidoraavisander.com"
    VITE_GOOGLE_MAPS_API_KEY = "AIzaSyAOqcIUQ-J3e329g9mnajlzuGHgDWQKuI4"
    VITE_STORE_LAT = "7.1294038"
    VITE_STORE_LNG = "-73.1170752"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  APP_URL = "https://distribuidoraavisander.com"
  FRONTEND_URL = "https://distribuidoraavisander.com,https://www.distribuidoraavisander.com"
  DB_PATH = "/data/database.sqlite"
  UPLOADS_PATH = "/data/uploads"
  COOKIES_SECURE = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[mounts]]
  source = "avisander_data"
  destination = "/data"
