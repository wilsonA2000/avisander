# fly.toml app configuration file generated for distribuidoraavisander on 2026-04-18T22:45:27-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'distribuidoraavisander'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    VITE_GOOGLE_MAPS_API_KEY = 'AIzaSyAOqcIUQ-J3e329g9mnajlzuGHgDWQKuI4'
    VITE_PUBLIC_URL = 'https://distribuidoraavisander.com'
    VITE_STORE_LAT = '7.1294038'
    VITE_STORE_LNG = '-73.1170752'

[env]
  APP_URL = 'https://distribuidoraavisander.com'
  COOKIES_SECURE = '1'
  DB_PATH = '/data/database.sqlite'
  MEDIA_PATH = '/data/media'
  FRONTEND_URL = 'https://distribuidoraavisander.com,https://www.distribuidoraavisander.com'
  NODE_ENV = 'production'
  PORT = '3000'
  TZ = 'America/Bogota'
  UPLOADS_PATH = '/data/uploads'

[[mounts]]
  source = 'avisander_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
