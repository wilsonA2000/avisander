<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="p-frame-top" x1="20" y1="55" x2="108" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="50%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#444444"/>
    </linearGradient>
    <linearGradient id="p-frame-front" x1="64" y1="60" x2="64" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="p-grill-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="40%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </linearGradient>
    <linearGradient id="p-char" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A0A00"/>
      <stop offset="50%" stop-color="#3D1A00"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <linearGradient id="p-flame1" x1="50%" y1="100%" x2="50%" y2="0%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="40%" stop-color="#FF5500"/>
      <stop offset="100%" stop-color="#CC1100" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="p-flame2" x1="50%" y1="100%" x2="50%" y2="0%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFAA00"/>
      <stop offset="60%" stop-color="#FF3300"/>
      <stop offset="100%" stop-color="#990000" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="p-coal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4400" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#991100" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#440000" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="p-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="p-highlight" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="64" cy="116" rx="36" ry="6" fill="url(#p-shadow)"/>

  <!-- Legs isometric -->
  <rect x="28" y="76" width="7" height="30" rx="2.5" fill="#222222"/>
  <rect x="93" y="76" width="7" height="30" rx="2.5" fill="#222222"/>
  <rect x="55" y="80" width="6" height="26" rx="2.5" fill="#1A1A1A"/>
  <rect x="67" y="80" width="6" height="26" rx="2.5" fill="#1A1A1A"/>

  <!-- Frame front face -->
  <path d="M20 60 Q20 80 64 82 Q108 80 108 60 Z" fill="url(#p-frame-front)"/>

  <!-- Coals / heat bed -->
  <ellipse cx="64" cy="60" rx="38" ry="13" fill="#2A1200"/>
  <ellipse cx="64" cy="60" rx="32" ry="10" fill="url(#p-coal)"/>

  <!-- Flames -->
  <path d="M36 60 C34 52 32 46 37 39 C39 35 38 30 41 27 C40 33 44 35 42 40 C46 34 45 27 50 24 C48 31 52 35 50 40 C52 34 55 29 58 27 C55 35 55 40 54 45 C55 40 58 36 62 34 C59 42 60 47 58 53 C60 48 63 44 66 43 C63 50 63 55 65 60 Z" fill="url(#p-flame1)" opacity="0.92"/>
  <path d="M63 60 C61 53 59 47 63 41 C65 37 64 32 67 29 C66 35 69 37 68 42 C71 37 70 31 73 28 C72 35 75 38 73 43 C76 38 79 34 82 32 C80 39 79 45 79 50 C80 45 83 41 86 39 C83 46 83 51 85 56 C83 52 86 48 88 46 C86 53 84 57 86 60 Z" fill="url(#p-flame2)" opacity="0.85"/>

  <!-- Frame top rim (isometric) -->
  <ellipse cx="64" cy="58" rx="44" ry="15" fill="url(#p-frame-top)"/>
  <ellipse cx="64" cy="58" rx="38" ry="12" fill="#2A1200"/>

  <!-- Grill bars horizontal -->
  <line x1="26" y1="57" x2="102" y2="57" stroke="url(#p-grill-bar)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="26" y1="62" x2="102" y2="62" stroke="url(#p-grill-bar)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="26" y1="52" x2="102" y2="52" stroke="url(#p-grill-bar)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Grill bars vertical -->
  <line x1="40" y1="48" x2="40" y2="68" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="46" x2="55" y2="70" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="46" x2="70" y2="70" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="48" x2="85" y2="68" stroke="#555" stroke-width="2" stroke-linecap="round"/>

  <!-- Char marks (blackened lines on bars) -->
  <line x1="40" y1="52" x2="85" y2="52" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="40" y1="62" x2="85" y2="62" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Highlight on top rim -->
  <path d="M25 55 Q40 48 64 47 Q88 48 103 55" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.3" fill="none" stroke-linecap="round"/>
</svg>
