<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Body -->
    <linearGradient id="m-body-top" x1="10" y1="28" x2="118" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CCCCCC"/>
      <stop offset="50%" stop-color="#EEEEEE"/>
      <stop offset="100%" stop-color="#AAAAAA"/>
    </linearGradient>
    <linearGradient id="m-body-front" x1="64" y1="32" x2="64" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#999"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <linearGradient id="m-body-side" x1="106" y1="32" x2="118" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#AAAAAA"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <!-- Door glass -->
    <radialGradient id="m-door-glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#66CCFF" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#2266AA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#001133" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="m-door-glow-warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FF8800" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#CC2200" stop-opacity="0.1"/>
    </radialGradient>
    <!-- Buttons -->
    <linearGradient id="m-btn-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAA22"/>
      <stop offset="100%" stop-color="#E07000"/>
    </linearGradient>
    <linearGradient id="m-btn-gray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AAAAAA"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <linearGradient id="m-btn-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#AA0000"/>
    </linearGradient>
    <!-- Display -->
    <linearGradient id="m-display" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2A0A"/>
      <stop offset="100%" stop-color="#000800"/>
    </linearGradient>
    <!-- Microwave lines inside -->
    <linearGradient id="m-wave" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#66DDFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#44AAEE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#66DDFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="m-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="64" cy="116" rx="44" ry="6" fill="url(#m-shadow)"/>

  <!-- Right side face (isometric) -->
  <path d="M106 32 L118 44 L118 104 L106 104 Z" fill="url(#m-body-side)"/>

  <!-- Top face (isometric) -->
  <path d="M10 28 L106 28 L118 44 L22 44 Z" fill="url(#m-body-top)"/>

  <!-- Front face (main body) -->
  <rect x="10" y="28" width="96" height="76" rx="4" fill="url(#m-body-front)"/>

  <!-- Front panel base -->
  <rect x="10" y="28" width="96" height="76" rx="4" fill="#5E5E5E"/>

  <!-- Door area (left ~70%) -->
  <rect x="15" y="34" width="68" height="62" rx="3" fill="#3A3A3A"/>

  <!-- Door glass window -->
  <rect x="18" y="37" width="62" height="56" rx="2" fill="#0A0C10"/>
  <rect x="18" y="37" width="62" height="56" rx="2" fill="url(#m-door-glow)"/>

  <!-- Warm glow inside (food heating) -->
  <rect x="18" y="37" width="62" height="56" rx="2" fill="url(#m-door-glow-warm)" opacity="0.7"/>

  <!-- Food plate (turntable) visible through door -->
  <ellipse cx="49" cy="68" rx="22" ry="14" fill="#1A0A00" opacity="0.6"/>
  <ellipse cx="49" cy="68" rx="18" ry="11" fill="#8B4010" opacity="0.5"/>
  <ellipse cx="49" cy="68" rx="14" ry="9" fill="#C06020" opacity="0.4"/>
  <!-- Turntable center -->
  <circle cx="49" cy="68" r="3" fill="#444" opacity="0.7"/>

  <!-- Microwave energy lines -->
  <path d="M24 55 Q36 52 38 58 Q36 64 24 61" stroke="url(#m-wave)" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
  <path d="M24 62 Q40 59 42 65 Q40 71 24 68" stroke="url(#m-wave)" stroke-width="1.2" fill="none" stroke-opacity="0.5"/>
  <path d="M26 74 Q38 71 40 77 Q38 83 26 80" stroke="url(#m-wave)" stroke-width="1" fill="none" stroke-opacity="0.4"/>

  <!-- Glass reflection on door -->
  <path d="M20 39 Q36 37 56 38" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.25" fill="none" stroke-linecap="round"/>
  <path d="M20 40 L20 88" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" fill="none"/>

  <!-- Door handle (vertical) -->
  <rect x="80" y="52" width="5" height="28" rx="2.5" fill="#888"/>
  <rect x="80" y="52" width="5" height="10" rx="2.5" fill="#AAAAAA"/>

  <!-- Right control panel -->
  <rect x="87" y="34" width="16" height="62" rx="2" fill="#4A4A4A"/>

  <!-- Digital display -->
  <rect x="88" y="37" width="14" height="16" rx="2" fill="url(#m-display)"/>
  <!-- Clock digits (green glow) -->
  <text x="90" y="49" font-family="monospace" font-size="8" fill="#00FF88" fill-opacity="0.8">8:88</text>

  <!-- Buttons grid -->
  <!-- Row 1 -->
  <rect x="89" y="58" width="5" height="4" rx="1.5" fill="url(#m-btn-orange)"/>
  <rect x="96" y="58" width="5" height="4" rx="1.5" fill="url(#m-btn-orange)"/>
  <!-- Row 2 -->
  <rect x="89" y="65" width="5" height="4" rx="1.5" fill="url(#m-btn-gray)"/>
  <rect x="96" y="65" width="5" height="4" rx="1.5" fill="url(#m-btn-gray)"/>
  <!-- Row 3 -->
  <rect x="89" y="72" width="5" height="4" rx="1.5" fill="url(#m-btn-gray)"/>
  <rect x="96" y="72" width="5" height="4" rx="1.5" fill="url(#m-btn-gray)"/>
  <!-- Start button (red) -->
  <rect x="89" y="82" width="12" height="7" rx="2.5" fill="url(#m-btn-red)"/>
  <rect x="89" y="82" width="12" height="3" rx="1.5" fill="#FF6666" opacity="0.4"/>

  <!-- Body top highlight -->
  <path d="M12 30 Q60 28 104 30" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3" fill="none" stroke-linecap="round"/>
  <path d="M12 30 L12 100" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2" fill="none"/>

  <!-- Side face highlight -->
  <path d="M108 44 L108 100" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15" fill="none"/>
</svg>
