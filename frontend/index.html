<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F58220" />
    <meta name="description" content="Avisander — Carnicería premium en Bucaramanga. Cortes de res, cerdo, pollo y embutidos con cadena de frío y entregas a domicilio. Atención personalizada por WhatsApp." />
    <title>Avisander — Carnicería Premium en Bucaramanga</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Avisander" />
    <meta property="og:title" content="Avisander — Carnicería Premium en Bucaramanga" />
    <meta property="og:description" content="Cortes premium con cadena de frío, entregas a domicilio y atención por WhatsApp." />
    <meta property="og:locale" content="es_CO" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect a dominios críticos: ahorra ~100-300ms en primer fetch. -->
    <!-- Cloudflare Insights se carga automáticamente desde el edge. -->
    <link rel="preconnect" href="https://static.cloudflareinsights.com">
    <!-- Bold: script del botón de pago (sólo relevante en /carrito). -->
    <link rel="dns-prefetch" href="https://checkout.bold.co">
    <!-- Google Maps: cuando el cliente busca dirección. -->
    <link rel="dns-prefetch" href="https://maps.googleapis.com">
    <link rel="dns-prefetch" href="https://places.googleapis.com">
    <!-- Hero: imagen externa actual (será reemplazada por local). -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
